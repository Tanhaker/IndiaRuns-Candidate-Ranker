ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and drafting. All
  scoring-weight calibration against the planted trap profiles, the feature
  design, and the engineering decisions are the team's own. No candidate data
  was sent to any hosted LLM, and no LLM is called anywhere in the ranking path
  (a hard requirement of the CPU/no-network compute budget).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Transparent hybrid ranker, CPU-only and fully offline. An interpretable
  rule-based scorer (title-tier fit, corroborated skill-trust, product-vs-
  services career evidence, experience, education, location) is fused with a
  TF-IDF semantic JD-match lane, then modulated by a behavioral-availability
  multiplier built from the 23 Redrob signals. The decisive anti-stuffing
  mechanism is corroboration: a skill counts only in proportion to proficiency
  × √(duration_months) × log-endorsements, so AI keywords listed with ~0 months
  used earn almost nothing. Explicit penalties handle the JD's stated dislikes
  (keyword stuffers, framework enthusiasts, all-services careers, title-chasers,
  CV/speech-only). A honeypot guard sinks impossible profiles. On the public
  pool: 0 honeypots and 0 non-technical titles in the top-100, the planted
  stuffer falls to rank ~87,600/100,000, and all 100 reasonings are unique and
  fact-grounded. Runtime ~40s for 100K candidates. Architecture is
  embedding-swappable (drop in precomputed BGE/E5 at one seam) as the production
  upgrade path.

